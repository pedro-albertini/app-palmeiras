name: PIPELINE1

on:
  push:
    branches:
      - main
      
  pull_request:
    branches:
      - main

jobs:

  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v3

      - name: Configurar o python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Intalar as dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Teste
        run: pytest
  
  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Simular deploy
        run: echo "Deploy feito com sucesso em produção"