name: Pipeline dev

on:
  push:
    branches:
      - main
      

jobs:

  security:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Cache de dependencias Python
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Instalar o dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: Scan for secrets
        uses: gitleaks/gitleaks-action@v2


  quality:
    runs-on: ubuntu-latest
    needs: security

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Cache de dependencias Python
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-
      
      - name: Instalar o dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      

      - name: Análise com SonarCloud
        uses: SonarSource/sonarcloud-github-action@v2
        with:
          args: >
            -Dsonar.projectKey=pedro-albertini_app-palmeiras
            -Dsonar.organization=pedro-albertini  
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Rodar lint
        run: python -m pylint --fail-under=7.0 --disable=C0114,C0116 test_app.py

      - name: Rodar corevage
        run: |
          python -m coverage run -m pytest test_app.py
          python -m coverage report --fail-under=80

